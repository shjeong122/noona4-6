<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- bootstap-link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="../js/common.js"></script>
    <link rel="icon" href="../image/logo2.jpg" type="image/png" />
    <title>COALMO</title>
  </head>
  <body>
    <div class="wrap">
      <!-- nav 수정사항 layout 내 header 수정 후 복붙으로 수정 -->
      <header>
        <nav class="navbar">
          <div class="logo">
            <a href="../index.html" class="nav_brand">COALMO</a>
            <a href="../index.html" class="logo_img"
              ><img src="../image/logo.jpg"
            /></a>
          </div>
          <div class="nav_buttons">
            <button
              onclick="location.href='../group/index.html'"
              class="button_register"
              type="submit"
            >
              팀원 모집하기
            </button>
            <button
              onclick="location.href='../mypage/index.html'"
              class="button_mypage"
              type="submit"
            >
              마이페이지
            </button>
            <a href="../login/index.html" class="header_icon"
              ><i class="fa-solid fa-arrow-right-to-bracket"></i
            ></a>
            <a id="icon_menubar" href="#" class="header_icon_mb"
              ><i class="fa-solid fa-bars"></i
            ></a>
          </div>
        </nav>
        <div id="nav_mobile_menu" class="nav_mobile_menu">
          <a href="../mypage/index.html" class="nav_mobile_menu_link"
            >마이페이지</a
          >
          <a href="../group/index.html" class="nav_mobile_menu_link"
            >팀원 모집하기</a
          >
        </div>
      </header>

      <main
        class="main_container h-100 d-flex justify-content-center align-items-center my-5"
      >
        <div class="card rounded-4 p-4 login-card bg-white">
          <div class="text-center mb-3">
            <h4 class="mb-0">회원가입</h4>
          </div>

          <div>
            <div class="mb-3">
              <label for="loginId" class="form-label">이메일</label>
              <div class="input-group">
                <input
                  type="email"
                  class="form-control"
                  id="loginId"
                  name="loginId"
                  placeholder="이메일 주소를 입력해 주세요."
                  required
                />
              </div>
            </div>
            <div class="mb-3">
              <label for="loginId" class="form-label">사용자 이름</label>
              <div class="input-group">
                <input
                  type="text"
                  class="form-control"
                  id="loginId"
                  name="loginId"
                  placeholder="사용자 이름을 입력해 주세요."
                  required
                />
              </div>
            </div>

            <div class="mb-3">
              <label for="loginPw" class="form-label">비밀번호</label>
              <div class="input-group">
                <input
                  type="password"
                  class="form-control"
                  id="loginPw"
                  name="loginPw"
                  placeholder="비밀번호 입력해 주세요."
                  minlength="6"
                  required
                />
              </div>
            </div>
            <div class="mb-3">
              <label for="loginPw" class="form-label">비밀번호 확인</label>
              <div class="input-group">
                <input
                  type="password"
                  class="form-control"
                  id="loginPw"
                  name="loginPw"
                  placeholder="비밀번호를 한 번 더 입력해 주세요."
                  minlength="6"
                  required
                />
              </div>
            </div>
            <button
              type="button"
              class="btn w-100 py-2"
              data-bs-toggle="modal"
              data-bs-target="#exampleModal"
            >
              회원가입
            </button>
          </div>
        </div>

        <div
          class="modal fade"
          id="exampleModal"
          tabindex="-1"
          aria-labelledby="exampleModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">
                  회원가입을 환영합니다!
                </h1>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                ></button>
              </div>
              <div class="modal-footer">
                <button
                  type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal"
                >
                  <a
                    class="text-decoration-none text-reset"
                    href="../login/index.html"
                    >확인</a
                  >
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- footer 수정사항 layout 내 footer 수정 후 복붙으로 수정 -->
      <footer class="footer_container py-4 mt-auto">
        <div class="container">
          <div class="row footer_first_row">
            <div class="col-lg-3 col-md-6 col-sm-12">
              <a href="#" class="text-decoration-none">문의하기</a>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-12">
              <a href="#" class="text-decoration-none">이용약관</a>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-12">
              <a href="#" class="text-decoration-none">개인정보처리방침</a>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-12">
              <a href="#" class="text-decoration-none">회사소개</a>
            </div>
          </div>
          <div class="footer_main">
            <a href="../index.html" class="footer_nav_brand">COALMO</a>
            <p class="footer_text">
              코딩알려주는 누나<br />
              HTML & CSS 스터디 4기 6조<br />
              심현정 조상옥 백예인 김이진
            </p>
            <div class="text-center pt-3 border-top border-light mt-3">
              © 2025 COALMO Co., Ltd. All rights reserved.
            </div>
          </div>
        </div>
      </footer>
    </div>

    <!-- bootstap-script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
