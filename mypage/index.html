<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- bootstap-link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 공통 스타일 -->
    <link rel="stylesheet" href="../css/common.css" />
    <!-- main 스타일 -->
    <link rel="stylesheet" href="style.css" />
    <!-- 공통 JS 연결 -->
    <script src="../js/common.js"></script>
  </head>
  <body>
    <sect class="wrap">
      <!-- nav 수정사항 layout 내 header 수정 후 복붙으로 수정 -->
       <!-- head태그 안에 Font Awesome link 태그 넣기  -->
      <header>
        <nav class="navbar">
          <section class="logo">
            <a href="../index.html" class="nav_brand">COALMO</a>
            <a href="../index.html" class="logo"><img src="/image/logo.jpg" /></a>
          </section>
          <section class="nav_buttons">
            <button onclick="location.href='../group/index.html'" class="button_register" type="submit">팀원 모집하기</button>
            <button onclick="location.href='../mypage/index.html'" class="button_mypage" type="submit">마이페이지</button>
            <a href="#" class="header_icon"><i class="fa-regular fa-bell header_icon"></i></a>
            <a id="icon_menubar" href="#" class="header_icon_mb"><i class="fa-solid fa-bars"></i></a>
          </section>
          <section id="nav_mobile_menu" class="nav_mobile_menu">
            <a href="../mypage/index.html" class="nav_mobile_menu_link"><p>마이페이지</p></a>
            <a href="../group/index.html" class="nav_mobile_menu_link"><p>팀원 모집하기</p></a>
          </section>
        </nav>
      </header>

      <!-- main 내용 작성 -->
      <main class="main_conteiner">
        <!-- 프로필 -->
  <section class="profile-card">
    <div class="avatar-wrap">
      <img class="avatar" src="/image/profile.jpg" alt="프로필 이미지"/>
      <label class="avatar-btn">
        사진 변경
        <input type="file" accept="image/*" hidden>
      </label>
    </div>

    <div class="profile-basic">
      <div class="field">
        <label>닉네임 *</label>
        <input class="form-control" type="text" value="코알모(코딩 알려주는 모임)">
      </div>

      <div class="grid-2">
        <div class="field">
          <label>이름 *</label>
          <input class="form-control" type="text" value="코알모">
        </div>
        <div class="field">
          <label>직무 *</label>
          <select class="form-select" aria-label="Default select example">
            <option selected>프론트엔드</option>
            <option value="1">백엔드</option>
            <option value="2">디자이너</option>
            <option value="3">IOS</option>
            <option value="4">안드로이드</option>
            <option value="5">데브옵스</option>
            <option value="6">PM</option>
            <option value="7">기획</option>
            <option value="8">마케팅</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>경력 *</label>
        <input class="form-control" type="text" value="2년">
      </div>

      <div class="grid-2">
        <div class="field">
          <label>이메일 (선택)</label>
          <input type="email" class="form-control" value="me@example.com">
        </div>
        <div class="field">
          <label>전화번호 (선택)</label>
          <input type="tel" class="form-control" value="010-0000-2222">
        </div>
      </div>
    </div>
  </section>

  <!-- 관심분야: 체크박스 + label 칩 -->
  <section class="card">
    <h2 class="">관심분야</h2>
    <div class="">
      <!-- checkbox는 숨기고 label을 칩처럼 스타일 -->
      <input id="int-frontend" type="checkbox" name="interests" value="Frontend" checked hidden>
      <label class="" for="int-frontend">Frontend</label>

      <input id="int-backend" type="checkbox" name="interests" value="Backend" hidden>
      <label class="" for="int-backend">Backend</label>

      <input id="int-react" type="checkbox" name="interests" value="React" checked hidden>
      <label class="" for="int-react">React</label>

      <input id="int-spring" type="checkbox" name="interests" value="Spring" hidden>
      <label class="" for="int-spring">Spring</label>

      <input id="int-devops" type="checkbox" name="interests" value="DevOps" checked hidden>
      <label class="" for="int-devops">DevOps</label>
    </div>
  </section>

  <!-- 보유스킬: 라디오에서 기본 선택을 checked로 -->
  <section class="card">
    <h2 class="section-title">보유스킬</h2>

    <div class="skill-row">
      <input class="skill-name" type="text" name="skill_js_name" value="JavaScript">
      <div class="skill-level">
        <label><input type="radio" name="skill_js_level" value="상"> 상</label>
        <label><input type="radio" name="skill_js_level" value="중" checked> 중</label>
        <label><input type="radio" name="skill_js_level" value="하"> 하</label>
      </div>
      <button type="submit" name="action" value="removeSkill_java" class="btn ghost">삭제</button>
    </div>

    <div class="skill-row">
      <input class="skill-name" type="text" name="skill_java_name" value="Java">
      <div class="skill-level">
        <label><input type="radio" name="skill_java_level" value="상" checked> 상</label>
        <label><input type="radio" name="skill_java_level" value="중"> 중</label>
        <label><input type="radio" name="skill_java_level" value="하"> 하</label>
      </div>
      <button type="submit" name="action" value="addSkill" class="btn ghost">+ 스킬추가</button>
    </div>
  </section>

  <!-- 경력: 이미 여러 줄이 있는 것처럼 미리 써두기 -->
  <section class="card">
    <h2 class="section-title">경력</h2>

    <div class="career-item">
      <div class="grid-2">
        <input class="career-period" type="text" name="career_1_period" value="2023 ~ 현재">
        <input class="career-title" type="text" name="career_1_title" value="어뉴페이지 / 풀스택 개발">
      </div>
      <textarea class="career-desc" name="career_1_desc" rows="3">사내 업무자동화 도구 개발, 성능 최적화, 코드리뷰 문화 정착</textarea>
    </div>

    <div class="career-item">
      <div class="grid-2">
        <input class="career-period" type="text" name="career_2_period" value="2021 ~ 2023">
        <input class="career-title" type="text" name="career_2_title" value="스타트업 / 백엔드 개발">
      </div>
      <textarea class="career-desc" name="career_2_desc" rows="3">Spring 기반 API 개발, 배포 파이프라인 정리</textarea>
    </div>

    <button type="submit" name="action" value="addCareer" class="btn ghost">+ 경력 추가</button>
  </section>

  <!-- 포트폴리오 -->
  <section class="card">
    <h2 class="section-title">포트폴리오</h2>

    <h3 class="sub-title">링크</h3>
    <div class="stack">
      <div class="link-row">
        <input type="url" name="pf_link_1" value="https://github.com/username/project-a">
        <button type="submit" name="action" value="addLink" class="btn ghost">+ 링크 추가</button>
      </div>
      <div class="link-row">
        <input type="url" name="pf_link_2" value="https://devlog.example.com/post/123">
        <button type="submit" name="action" value="removeLink_2" class="btn ghost">삭제</button>
      </div>
    </div>

    <h3 class="sub-title">파일 업로드</h3>
    <!-- 이미 업로드된 파일은 '링크 목록'으로 보여주기 -->
    <ul class="file-list">
      <li>
        <span>📄</span>
        <a href="/uploads/Resume_2025.pdf" download>Resume_2025.pdf</a>
        <span class="muted">(245 KB)</span>
      </li>
      <li>
        <span>📄</span>
        <a href="/uploads/Portfolio_CaseStudy.pdf" download>Portfolio_CaseStudy.pdf</a>
        <span class="muted">(1.2 MB)</span>
      </li>
    </ul>
    <!-- 새로 올릴 파일(교체/추가)은 여기서 첨부 -->
    <input type="file" name="pf_files" multiple>
  </section>

  <!-- 자기소개 -->
  <section class="card">
    <h2 class="section-title">자기소개</h2>
    <textarea id="aboutMe" name="about" rows="8">안녕하세요. 풀스택 2년차 개발자입니다. 사용자 경험을 해치지 않는 성능 최적화와 배포 자동화에 관심이 많고, 스터디/사이드프로젝트를 통해 프론트엔드 역량도 키우고 있습니다.</textarea>
  </section>

  <div class="actions">
    <button type="submit" class="btn primary">저장</button>
  </div>
  </main>
        
      </main>

      <!-- footer 수정사항 layout 내 footer 수정 후 복붙으로 수정 -->
      <footer class="footer_container py-4 mt-auto">
        <div class="container">
          <div class="row footer_first_row">
              <div class="col-lg-3 col-md-6 col-sm-12">
                <a href="#" class="text-decoration-none">문의하기</a>
              </div>
              <div class="col-lg-3 col-md-6 col-sm-12">
                <a href="#" class="text-decoration-none">이용약관</a>
              </div>
              <div class="col-lg-3 col-md-6 col-sm-12">
                <a href="#" class="text-decoration-none">개인정보처리방침</a>
              </div>
              <div class="col-lg-3 col-md-6 col-sm-12">
                <a href="#" class="text-decoration-none">회사소개</a>
              </div>
          </div>
          <div class="footer_text">
            <a href="/index.html" class="footer_nav_brand">COALMO</a>
            <p class="footer_text">
              코딩알려주는 누나<br />
              HTML & CSS 스터디 4기 6조<br />
              심현정 조상옥 백예인 김이진
            </p>
            <div class="text-center pt-3 border-top border-light mt-3">
              © 2025 COALMO Co., Ltd. All rights reserved.
            </div>
          </div>
        </div>
      </footer>
    </div>

    <!-- bootstap-script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
