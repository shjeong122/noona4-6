<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- bootstap-link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 공통 스타일 -->
    <link rel="stylesheet" href="../css/common.css" />
    <!-- main 스타일 -->
    <link rel="stylesheet" href="style.css" />
    <!-- 공통 JS 연결 -->
    <script src="../js/common.js"></script>
  </head>
  <body>
    <sect class="wrap">
      <!-- nav 수정사항 layout 내 header 수정 후 복붙으로 수정 -->
       <!-- head태그 안에 Font Awesome link 태그 넣기  -->
      <header>
        <nav class="navbar">
          <div class="logo">
            <a href="../index.html" class="nav_brand">COALMO</a>
            <a href="../index.html" class="logo_img"><img src="../image/logo.jpg" /></a>
          </div>
          <div class="nav_buttons">
            <button onclick="location.href='../group/index.html'" class="button_register" type="submit">팀원 모집하기</button>
            <button onclick="location.href='../mypage/index.html'" class="button_mypage" type="submit">마이페이지</button>
            <a href="#" class="header_icon"><i class="fa-regular fa-bell header_icon"></i></a>
            <a id="icon_menubar" href="#" class="header_icon_mb"><i class="fa-solid fa-bars"></i></a>
          </div>
        </nav>
        <div id="nav_mobile_menu" class="nav_mobile_menu">
          <a href="../mypage/index.html" class="nav_mobile_menu_link">마이페이지</a>
          <a href="../group/index.html" class="nav_mobile_menu_link">팀원 모집하기</a>
        </div>
      </header>

      <!-- main 내용 작성 -->
      <main class="main_conteiner">
        <!-- 프로필 -->
        <section class="profile-card">
          <div class="avatar-wrap">
            <img class="avatar" src="/image/profile.jpg" alt="프로필 이미지"/>
            <label class="avatar-btn">
              사진 변경
              <input type="file" accept="image/*" hidden>
            </label>
          </div>

          <div class="profile-basic">
            <div class="field">
              <label>닉네임 *</label>
              <input class="form-control" type="text" value="코알모(코딩 알려주는 모임)">
            </div>

            <div class="grid-2">
              <div class="field">
                <label>이름 *</label>
                <input class="form-control" type="text" value="코알모">
              </div>
              <div class="field">
                <label>직무 *</label>
                <select class="form-select" aria-label="Default select example">
                  <option selected>프론트엔드</option>
                  <option value="1">백엔드</option>
                  <option value="2">디자이너</option>
                  <option value="3">IOS</option>
                  <option value="4">안드로이드</option>
                  <option value="5">데브옵스</option>
                  <option value="6">PM</option>
                  <option value="7">기획</option>
                  <option value="8">마케팅</option>
                </select>
              </div>
            </div>
            
            <div class="grid-2">
              <div class="field">
                <label>경력 *</label>
                <div class="input-with-unit">
                  <input class="form-control" type="number" value="2">
                  <span class="unit">년</span>
                </div>
              </div>
            </div>

            <div class="grid-2">
              <div class="field">
                <label>이메일 (선택)</label>
                <input type="email" class="form-control" value="coalmo@naver.com">
              </div>
              <div class="field">
                <label>전화번호 (선택)</label>
                <input type="tel" class="form-control" value="010-1111-2222">
              </div>
            </div>
          </div>
        </section>

        <!-- 관심분야: 체크박스 + label 칩 -->
        <section class="card">
          <h2 class="section-title">관심분야</h2>
          <div class="chip-list">
            <!-- checkbox는 숨기고 label을 칩처럼 스타일 -->
            <input id="int-frontend" type="checkbox" name="interests" value="Frontend" checked hidden>
            <label class="chip" for="int-frontend">Frontend</label>

            <input id="int-backend" type="checkbox" name="interests" value="Backend" hidden>
            <label class="chip" for="int-backend">Backend</label>

            <input id="int-react" type="checkbox" name="interests" value="React" checked hidden>
            <label class="chip" for="int-react">React</label>

            <input id="int-spring" type="checkbox" name="interests" value="Spring" hidden>
            <label class="chip" for="int-spring">Spring</label>

            <input id="int-devops" type="checkbox" name="interests" value="DevOps" checked hidden>
            <label class="chip" for="int-devops">DevOps</label>

            <input id="int-design" type="checkbox" name="interests" value="Design" hidden>
            <label class="chip" for="int-design">Design</label>
          </div>
        </section>

        <!-- 보유스킬: 라디오에서 기본 선택을 checked로 -->
        <section class="card">
          <h2 class="section-title">보유스킬</h2>

          <div class="skill-row">
            <input class="skill-name" type="text" name="skill_js_name" value="JavaScript">
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio">
              <label class="form-check-label" for="radioDefault1"> 상</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" checked>
              <label class="form-check-label" for="radioDefault2"> 중</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio">
              <label class="form-check-label" for="radioDefault2"> 하</label>
            </div>
            <button type="submit" name="action" value="removeSkill_java" class="btn">삭제</button>
          </div>

          <div class="skill-row">
            <input class="skill-name" type="text" name="skill_java_name" value="Java">
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio">
              <label class="form-check-label" for="radioDefault1"> 상</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" checked>
              <label class="form-check-label" for="radioDefault2"> 중</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio">
              <label class="form-check-label" for="radioDefault2"> 하</label>
            </div>
            <button type="submit" name="action" value="removeSkill_java" class="btn">삭제</button>
          </div>
          <button type="submit" name="action" value="addSkill" class="btn">+ 스킬추가</button>
        </section>

        <!-- 경력 -->
        <section class="card">
          <h2 class="section-title">경력</h2>

          <div class="career-item">
            <div class="career-period-row">
              <label class="field-label" for="career_1_from">기간</label>
              <input id="career_1_from" class="year-input" type="number" name="career_1_from"
                    min="1900" max="2100" value="2023" placeholder="YYYY">
              <span class="tilde">~</span>
              <input id="career_1_to" class="year-input" type="number" name="career_1_to"
                    min="1900" max="2100" value="" placeholder="현재라면 공백">
            </div>

            <div class="career-company-row">
              <label class="field-label" for="career_1_title">회사명</label>
              <input id="career_1_title" class="career-brief" type="text" name="career_1_title"
                    value="코알모 / 프런트엔드 개발" placeholder="회사 / 팀 또는 직무">
            </div>

            <textarea class="career-desc" name="career_1_desc" rows="3">사내 업무자동화 도구 개발, 성능 최적화, 코드리뷰 문화 정착</textarea>
          </div>

          <div class="career-item">
            <div class="career-period-row">
              <label class="field-label" for="career_1_from">기간</label>
              <input id="career_1_from" class="year-input" type="number" name="career_1_from"
                    min="1900" max="2100" value="2021" placeholder="YYYY">
              <span class="tilde">~</span>
              <input id="career_1_to" class="year-input" type="number" name="career_1_to"
                    min="1900" max="2100" value="2023" placeholder="현재라면 비워두기">
            </div>

            <div class="career-company-row">
              <label class="field-label" for="career_1_title">회사명</label>
              <input id="career_1_title" class="career-brief" type="text" name="career_1_title"
                    value="스타트업 / 풀스택 개발" placeholder="회사 / 팀 또는 직무">
            </div>

            <textarea class="career-desc" name="career_1_desc" rows="3">Spring 기반 API 개발, 배포 파이프라인 정리</textarea>
          </div>          

          <button type="submit" name="action" value="addCareer" class="btn">+ 경력 추가</button>
        </section>

        <!-- 포트폴리오 -->
        <section class="card">
          <h2 class="section-title">포트폴리오</h2>

          <h3 class="sub-title">링크</h3>
          <div class="stack">
            <div class="link-row">
              <input type="url" name="pf_link_1" value="https://github.com/shjeong122/noona4-6">
              <button type="submit" name="action" value="removeLink_2" class="btn">삭제</button>
            </div>
            <div class="link-row">
              <input type="url" name="pf_link_2" value="https://www.notion.so/0de9548a&source=copy_link">
              <button type="submit" name="action" value="removeLink_2" class="btn">삭제</button>
            </div>
            <div class="btn-row">
              <button type="submit" name="action" value="addLink" class="btn">+ 링크 추가</button>
            </div>
          </div>

          <h3 class="sub-title">파일 업로드</h3>
          <ul class="file-list">
            <li>
              <span>📄</span>
              <a href="../image/logo2.jpg" download>Resume_2025.pdf</a>
              <span class="muted">(245 KB)</span>
            </li>
            <li>
              <span>📄</span>
              <a href="../image/logo.jpg" download>Portfolio_CaseStudy.pdf</a>
              <span class="muted">(1.2 MB)</span>
            </li>
          </ul>
          <div class="mb-3">
            <input class="form-control" type="file" id="formFileMultiple" multiple>
          </div>
        </section>

        <!-- 자기소개 -->
        <section class="card">
          <h2 class="section-title">자기소개</h2>
          <textarea class="aboutMe" name="about" rows="8">안녕하세요. 풀스택 2년차 개발자입니다. 사용자 경험을 해치지 않는 성능 최적화와 배포 자동화에 관심이 많고, 스터디/사이드프로젝트를 통해 프론트엔드 역량도 키우고 있습니다.</textarea>
        </section>

        <div class="save-area">
          <button type="submit" class="btn primary">수정 및 저장</button>
        </div>
      </main>
        
      </main>

      <!-- footer 수정사항 layout 내 footer 수정 후 복붙으로 수정 -->
      <footer class="footer_container py-4 mt-auto">
        <div class="container">
          <div class="row footer_first_row">
              <div class="col-lg-3 col-md-6 col-sm-12">
                <a href="#" class="text-decoration-none">문의하기</a>
              </div>
              <div class="col-lg-3 col-md-6 col-sm-12">
                <a href="#" class="text-decoration-none">이용약관</a>
              </div>
              <div class="col-lg-3 col-md-6 col-sm-12">
                <a href="#" class="text-decoration-none">개인정보처리방침</a>
              </div>
              <div class="col-lg-3 col-md-6 col-sm-12">
                <a href="#" class="text-decoration-none">회사소개</a>
              </div>
          </div>
          <div class="footer_main">
            <a href="/index.html" class="footer_nav_brand">COALMO</a>
            <p class="footer_text">
              코딩알려주는 누나<br />
              HTML & CSS 스터디 4기 6조<br />
              심현정 조상옥 백예인 김이진
            </p>
            <div class="text-center pt-3 border-top border-light mt-3">
              © 2025 COALMO Co., Ltd. All rights reserved.
            </div>
          </div>
        </div>
      </footer>
    </div>

    <!-- bootstap-script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
