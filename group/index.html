<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- bootstap-link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <!-- 공통 스타일 -->
    <link rel="stylesheet" href="../css/common.css" />
    <!-- main 스타일 -->
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="wrap">
      <!-- nav 수정사항 layout 내 header 수정 후 복붙으로 수정 -->
      <header>
        <nav class="navbar bg-body-tertiary">
          <div class="container-fluid">
            <a class="navbar-brand">Navbar</a>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </nav>
      </header>

      <!-- main 내용 작성 -->
      <main class="main_container">
        <section>
          <h1>팀원 모집 정보를 입력해주세요.</h1>
          <div class="row">
            <div class="col-12 col-md-6 col-lg-4">
              <div class="input-group mb-3">
                <label class="input-group-text" for="inputGroupSelect01"
                  >Options</label
                >
                <select class="form-select" id="inputGroupSelect01">
                  <option selected>Choose...</option>
                  <option value="1">One</option>
                  <option value="2">Two</option>
                  <option value="3">Three</option>
                </select>
              </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
              <div class="input-group mb-3">
                <label class="input-group-text" for="inputGroupSelect01"
                  >Options</label
                >
                <select class="form-select" id="inputGroupSelect01">
                  <option selected>Choose...</option>
                  <option value="1">One</option>
                  <option value="2">Two</option>
                  <option value="3">Three</option>
                </select>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h1>프로젝트 소개해주세요.</h1>
          <label class="input-group-text" for="inputGroupSelect01"
            >제목입력</label
          >
          <select class="form-select" id="inputGroupSelect01">
            <option selected>Choose...</option>
            <option value="1">One</option>
            <option value="2">Two</option>
            <option value="3">Three</option>
          </select>

          <div
            contenteditable="true"
            class="form-control"
            style="min-height: 200px"
          >
            여기에 글을 입력하세요...
          </div>
        </section>
        <button type="button" class="btn btn-primary">확인</button>
        <button type="button" class="btn btn-primary">취소</button>
      </main>

      <!-- footer 수정사항 layout 내 footer 수정 후 복붙으로 수정 -->
      <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container">
          <div class="row">
            <div class="col-md-4 mb-3">
              <h5>teamName</h5>
              <p>
                거주지<br />
                서울특별시 강남구 테헤란로 123<br />
                사업자등록번호: 123-45-67890
              </p>
            </div>
            <div class="col-md-4 mb-3">
              <h5>고객센터</h5>
              <p>
                Tel: 02-123-4567<br />
                Email: help@seontech.co.kr<br />
                운영시간: 평일 09:00~18:00
              </p>
            </div>
            <div class="col-md-4 mb-3">
              <h5>바로가기</h5>
              <ul class="list-unstyled">
                <li>
                  <a href="#" class="text-white text-decoration-none"
                    >회사소개</a
                  >
                </li>
                <li>
                  <a href="#" class="text-white text-decoration-none"
                    >이용약관</a
                  >
                </li>
                <li>
                  <a href="#" class="text-white text-decoration-none"
                    >개인정보처리방침</a
                  >
                </li>
              </ul>
            </div>
          </div>
          <div class="text-center pt-3 border-top border-light mt-3">
            © 2025 SeonTech Co., Ltd. All rights reserved.
          </div>
        </div>
      </footer>
    </div>

    <!-- bootstap-script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
