<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- bootstap-link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- 공통 스타일 -->
    <link rel="stylesheet" href="../css/common.css" />
    <!-- main 스타일 -->
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="wrap">
      <header>
        <nav class="navbar">
          <div class="logo">
            <a href="../index.html" class="nav_brand">COALMO</a>
            <a href="../index.html" class="logo_img"
              ><img src="../image/logo.jpg"
            /></a>
          </div>
          <div class="nav_buttons">
            <button
              onclick="location.href='../group/index.html'"
              class="button_register"
              type="submit"
            >
              팀원 모집하기
            </button>
            <button
              onclick="location.href='../mypage/index.html'"
              class="button_mypage"
              type="submit"
            >
              마이페이지
            </button>
            <a href="../login/index.html" class="header_icon"
              ><i class="fa-solid fa-arrow-right-to-bracket"></i
            ></a>
            <a id="icon_menubar" href="#" class="header_icon_mb"
              ><i class="fa-solid fa-bars"></i
            ></a>
          </div>
        </nav>
        <div id="nav_mobile_menu" class="nav_mobile_menu">
          <a href="../mypage/index.html" class="nav_mobile_menu_link"
            >마이페이지</a
          >
          <a href="../group/index.html" class="nav_mobile_menu_link"
            >팀원 모집하기</a
          >
        </div>
      </header>
      <!-- main 내용 작성 -->
      <main class="main_container">
        <section>
          <div class="group_title mx-3 mb-3">
            <h4>1</h4>
            <h4>팀원 모집 정보를 입력해주세요.</h4>
          </div>
        </section>
        <div class="ms-1 row">
          <div class="col-md-6 mb-3">
            <label class="input_title" for="inputGroupSelect01"
              >모집 구분</label
            >
            <select class="form-select pt-3 pb-3" id="inputGroupSelect01">
              <option disabled selected hidden>스터디/프로젝트</option>
              <option value="1">스터디</option>
              <option value="2">프로젝트</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="input_title" for="inputGroupSelect02"
              >모집 인원</label
            >
            <select class="form-select pt-3 pb-3" id="inputGroupSelect02">
              <option disabled selected hidden>인원 미정~10명 이상</option>
              <option value="1">인원 미정</option>
              <option value="1">1명</option>
              <option value="2">2명</option>
              <option value="3">3명</option>
              <option value="4">4명</option>
              <option value="5">5명</option>
              <option value="6">6명</option>
              <option value="7">7명</option>
              <option value="8">8명</option>
              <option value="9">9명</option>
              <option value="10">10명 이상</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="input_title" for="inputGroupSelect03"
              >진행 방식</label
            >
            <select class="form-select pt-3 pb-3" id="inputGroupSelect03">
              <option disabled selected hidden>온라인/오프라인</option>
              <option value="1">온/오프라인</option>
              <option value="1">온라인</option>
              <option value="2">오프라인</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="input_title" for="inputGroupSelect04"
              >진행 기간</label
            >
            <select class="form-select pt-3 pb-3" id="inputGroupSelect04">
              <option disabled selected hidden>기간 미정~6개월 이상</option>
              <option value="1">기간 미정</option>
              <option value="1">1개월</option>
              <option value="2">2개월</option>
              <option value="3">3개월</option>
              <option value="4">4개월</option>
              <option value="5">5개월</option>
              <option value="6">6개월</option>
              <option value="7">장기</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="input_title" for="inputGroupSelect05"
              >기술 스택</label
            >
            <select class="form-select pt-3 pb-3" id="inputGroupSelect05">
              <option disabled selected hidden>사용하는 기술 스택</option>
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="javascript">JavaScript</option>
              <option value="typescript">TypeScript</option>
              <option value="react">React</option>
              <option value="vue">Vue.js</option>
              <option value="node">Node.js</option>
              <option value="express">Express.js</option>
              <option value="mongodb">MongoDB</option>
              <option value="mysql">MySQL</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="input_title" for="inputGroupSelect06"
              >모집 마감일</label
            >
            <input type="date" class="form-control pt-3 pb-3" id="deadline" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="input_title" for="inputGroupSelect07"
              >모집 포지션</label
            >
            <select class="form-select pt-3 pb-3" id="inputGroupSelect07">
              <option disabled selected hidden>모집하는 포지션</option>
              <option value="frontend">프론트엔드 개발자</option>
              <option value="backend">백엔드 개발자</option>
              <option value="fullstack">풀스택 개발자</option>
              <option value="designer">UI/UX 디자이너</option>
              <option value="pm">프로젝트 매니저(PM)</option>
              <option value="planner">서비스 기획자</option>
              <option value="qa">QA/테스터</option>
              <option value="devops">DevOps 엔지니어</option>
              <option value="data">데이터 분석가</option>
              <option value="marketing">마케터</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="input_title" for="inputGroupSelect08"
              >연락 방법</label
            >
            <select class="form-select pt-3 pb-3" id="inputGroupSelect08">
              <option disabled selected hidden>SNS 연락방식</option>
              <option value="kakao">카카오톡</option>
              <option value="email">이메일</option>
              <option value="openchat">카카오 오픈채팅방</option>
              <option value="discord">디스코드</option>
              <option value="slack">슬랙</option>
              <option value="zoom">줌(Zoom)</option>
              <option value="etc">기타</option>
            </select>
            <input
              class="form-control pt-3 pb-3"
              id="inputGroupSelect01"
              type="url"
              placeholder="SNS URL"
            />
          </div>
        </div>
        <section>
          <div class="group_title mx-3 mb-3">
            <h4>2</h4>
            <h4>프로젝트 소개해주세요.</h4>
          </div>
          <div class="mx-3">
            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                id="postTitle"
                placeholder="글 제목을 입력해주세요!"
              />
            </div>

            <div class="btn-toolbar p-1">
              <div class="btn-group me-2">
                <button type="button" class="btn btn-outline-secondary btn-sm">
                  H1
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm">
                  H2
                </button>
              </div>
              <div class="btn-group me-2">
                <button type="button" class="btn btn-outline-secondary btn-sm">
                  <i class="fas fa-bold"></i>
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm">
                  <i class="fas fa-italic"></i>
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm">
                  <i class="fas fa-underline"></i>
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm">
                  <i class="fas fa-strikethrough"></i>
                </button>
              </div>
              <div class="btn-group me-2" role="group">
                <button type="button" class="btn btn-outline-secondary btn-sm">
                  <i class="fas fa-list-ul"></i>
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm">
                  <i class="fas fa-list-ol"></i>
                </button>
              </div>
              <div class="btn-group" role="group">
                <button type="button" class="btn btn-outline-secondary btn-sm">
                  <i class="fas fa-link"></i>
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm">
                  <i class="fas fa-image"></i>
                </button>
              </div>
            </div>
            <textarea
              type="text"
              class="form-control textarea_box"
              placeholder="글 제목을 입력해주세요!"
            ></textarea>
          </div>
        </section>

        <div class="d-flex justify-content-end my-3 btn_box">
          <button type="button " class="btn btn-primary ms-3">확인</button>
          <button type="button " class="btn btn-primary ms-3">취소</button>
        </div>
      </main>

      <!-- footer 수정사항 layout 내 footer 수정 후 복붙으로 수정 -->
      <footer class="footer_container py-4 mt-auto">
        <div class="container">
          <div class="row footer_first_row">
            <div class="col-lg-3 col-md-6 col-sm-12">
              <a href="#" class="text-decoration-none">문의하기</a>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-12">
              <a href="#" class="text-decoration-none">이용약관</a>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-12">
              <a href="#" class="text-decoration-none">개인정보처리방침</a>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-12">
              <a href="#" class="text-decoration-none">회사소개</a>
            </div>
          </div>
          <div class="footer_main">
            <a href="../index.html" class="footer_nav_brand">COALMO</a>
            <p class="footer_text">
              코딩알려주는 누나<br />
              HTML & CSS 스터디 4기 6조<br />
              심현정 조상옥 백예인 김이진
            </p>
            <div class="text-center pt-3 border-top border-light mt-3">
              © 2025 COALMO Co., Ltd. All rights reserved.
            </div>
          </div>
        </div>
      </footer>
    </div>

    <!-- bootstap-script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
